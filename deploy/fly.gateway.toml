# Fly.io config for a Moss telemetry gateway: a node with telemetry on, serving
# the read-only HTTP/SSE API the explorer reads and verifies. Fly terminates TLS
# on *.fly.dev, so the gateway is reachable at https:// — no mixed-content issues
# when the explorer is loaded over https.
#
# Run from the REPO ROOT (the build context must include the Go module). Pass
# --dockerfile so Fly builds THIS image instead of guessing with Nixpacks (whose
# "run-app" placeholder crashes). Use the app name `fly launch` created:
#   fly deploy -a <your-app> --config deploy/fly.gateway.toml --dockerfile deploy/Dockerfile.gateway
#
# Then point the explorer at  https://<your-app>.fly.dev  (add it in the gateways
# box, or share a link with ?gateways=https://<your-app>.fly.dev).
#
# The run command comes from the image ENTRYPOINT — do NOT add [processes]; a
# stray process command is what made Fly try to run a placeholder "run-app".

app = "moss-gateway"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile.gateway"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
