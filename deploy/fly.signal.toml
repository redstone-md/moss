# Fly.io config for a Moss WebRTC signaling relay. It only brokers SDP/ICE
# between browser peers in a room (mesh id) — it never sees mesh traffic, which
# stays end-to-end encrypted over the DataChannel. Fly's TLS makes it reachable
# at wss://<your-app>.fly.dev/signal, which browsers require from https pages.
#
# Run from the REPO ROOT. Pass --dockerfile so Fly builds THIS image (not
# Nixpacks). Use the app name `fly launch` created:
#   fly deploy -a <your-app> --config deploy/fly.signal.toml --dockerfile deploy/Dockerfile.signal
#
# The run command comes from the image ENTRYPOINT — do NOT add [processes].

app = "moss-signal"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile.signal"

# http_service proxies WebSocket upgrades, so wss:// works through Fly's edge.
[http_service]
  internal_port = 8788
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
