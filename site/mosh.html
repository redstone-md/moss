<!DOCTYPE html>
<html lang="en" data-theme="moss">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mosh-web — Moss in the browser</title>
  <meta name="description" content="A full Moss peer running in your browser over WebRTC — encrypted, serverless pub/sub." />
  <script>(function(){var t;try{t=localStorage.getItem("moss-theme")}catch(e){}if(!t)t=matchMedia("(prefers-color-scheme: light)").matches?"light":"moss";document.documentElement.setAttribute("data-theme",t)})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./dist/app.css" />
</head>
<body class="grid-bg min-h-screen">

  <header class="sticky top-0 z-40 border-b border-line/70 bg-bg/80 backdrop-blur">
    <nav class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4">
      <a href="./" class="flex items-center gap-2.5">
        <span class="grid h-9 w-9 place-items-center rounded-xl bg-accent/15 text-accent text-lg">❖</span>
        <span class="text-lg font-bold tracking-tight">mosh<span class="text-muted">-web</span></span>
      </a>
      <div class="hidden items-center gap-7 md:flex">
        <a href="./" class="nav-link">home</a>
        <a href="./explorer.html" class="nav-link">explorer</a>
        <a href="./mosh.html" class="nav-link text-ink">mosh-web</a>
        <a href="https://github.com/redstone-md/moss" class="nav-link">github</a>
      </div>
      <button data-theme-toggle class="chip hover:border-accent/50" title="switch theme">
        <span class="h-2.5 w-2.5 rounded-full bg-accent"></span>
        <span data-theme-label class="font-mono">moss</span>
      </button>
    </nav>
  </header>

  <main class="mx-auto max-w-3xl px-5 py-8">
    <div class="mb-6">
      <h1 class="text-3xl font-extrabold tracking-tight">mosh-web</h1>
      <p class="mt-1 text-sm text-muted">A full Moss peer in your browser over WebRTC. Messages are Noise-encrypted and routed peer-to-peer; the signaling server only brokers the connection.</p>
    </div>

    <div class="card mb-3 grid gap-3 p-4 sm:grid-cols-2">
      <label class="flex flex-col gap-1 text-xs uppercase tracking-widest text-muted">signaling
        <input id="signal" value="ws://127.0.0.1:8788/signal" class="rounded-lg border border-line bg-bg px-3 py-2 font-mono text-sm text-ink outline-none focus:border-accent/60" /></label>
      <div class="grid grid-cols-2 gap-3">
        <label class="flex flex-col gap-1 text-xs uppercase tracking-widest text-muted">mesh
          <input id="mesh" value="mosh-demo" class="rounded-lg border border-line bg-bg px-3 py-2 text-sm text-ink outline-none focus:border-accent/60" /></label>
        <label class="flex flex-col gap-1 text-xs uppercase tracking-widest text-muted">channel
          <input id="channel" value="lobby" class="rounded-lg border border-line bg-bg px-3 py-2 text-sm text-ink outline-none focus:border-accent/60" /></label>
      </div>
    </div>
    <div class="mb-4 flex items-center gap-3">
      <button id="join" class="btn-primary">join</button>
      <span id="status" class="text-sm text-muted">not connected</span>
    </div>

    <div id="log" class="card mb-3 h-[50vh] space-y-1 overflow-auto p-4 font-mono text-sm"></div>

    <div class="flex gap-3">
      <input id="text" autocomplete="off" placeholder="message…" class="flex-1 rounded-xl border border-line bg-bg px-4 py-2.5 text-sm text-ink outline-none focus:border-accent/60" />
      <button id="send" class="btn-primary" disabled>send</button>
    </div>
  </main>

  <script src="./wasm_exec.js"></script>
  <script type="module" src="./js/mosh.js"></script>
  <script src="./js/theme.js"></script>
</body>
</html>
