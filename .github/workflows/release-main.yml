name: Release Main

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-shared:
    name: Build Shared (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            output: libmoss.so
            header: libmoss.h
            goos: linux
            goarch: amd64
          - os: windows-latest
            label: windows-amd64
            output: moss.dll
            header: moss.h
            goos: windows
            goarch: amd64
          - os: macos-15-intel
            label: macos-amd64
            output: libmoss.dylib
            header: libmoss.h
            goos: darwin
            goarch: amd64
          - os: macos-latest
            label: macos-arm64
            output: libmoss.dylib
            header: libmoss.h
            goos: darwin
            goarch: arm64
    env:
      CGO_ENABLED: "1"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MinGW
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Build shared library
        run: go build -buildmode=c-shared -o ${{ matrix.output }} ./cmd/moss-ffi

      - name: Upload shared artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: moss-${{ matrix.label }}-shared
          path: |
            ${{ matrix.output }}
            ${{ matrix.header }}
          if-no-files-found: error
