name: Release Dev Tauri

on:
  push:
    tags:
      - "dev-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-dev-tauri-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Tauri (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-amd64
            rust-target: x86_64-unknown-linux-gnu
            artifact: moss-chat-tauri-dev-linux-amd64
            binary: apps/moss-chat-tauri/src-tauri/target/x86_64-unknown-linux-gnu/release/moss-chat-dev
            shared-output: libmoss.so
            shared-header: libmoss.h
            goos: linux
            goarch: amd64
          - os: windows-latest
            label: windows-amd64
            rust-target: x86_64-pc-windows-msvc
            artifact: moss-chat-tauri-dev-windows-amd64
            binary: apps/moss-chat-tauri/src-tauri/target/x86_64-pc-windows-msvc/release/moss-chat-dev.exe
            shared-output: moss.dll
            shared-header: moss.h
            goos: windows
            goarch: amd64
          - os: macos-15-intel
            label: macos-amd64
            rust-target: x86_64-apple-darwin
            artifact: moss-chat-tauri-dev-macos-amd64
            binary: apps/moss-chat-tauri/src-tauri/target/x86_64-apple-darwin/release/moss-chat-dev
            shared-output: libmoss.dylib
            shared-header: libmoss.h
            goos: darwin
            goarch: amd64
          - os: macos-latest
            label: macos-arm64
            rust-target: aarch64-apple-darwin
            artifact: moss-chat-tauri-dev-macos-arm64
            binary: apps/moss-chat-tauri/src-tauri/target/aarch64-apple-darwin/release/moss-chat-dev
            shared-output: libmoss.dylib
            shared-header: libmoss.h
            goos: darwin
            goarch: arm64
    defaults:
      run:
        working-directory: apps/moss-chat-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/moss-chat-tauri/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MinGW
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build shared runtime
        working-directory: .
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -buildmode=c-shared -o ${{ matrix.shared-output }} ./cmd/moss-ffi

      - name: Build Tauri binary
        run: npx tauri build --no-bundle --target ${{ matrix.rust-target }}

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.binary }}
            ${{ matrix.shared-output }}
            ${{ matrix.shared-header }}
            apps/moss-chat-tauri/README.md
          if-no-files-found: error
