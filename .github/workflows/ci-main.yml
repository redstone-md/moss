name: CI Main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MinGW
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Setup Python
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup .NET
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Setup Rust
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: go test ./... -count=1 -timeout 1800s

  build-shared:
    name: Build Shared (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            output: libmoss.so
            header: libmoss.h
            goos: linux
            goarch: amd64
          - os: windows-latest
            label: windows-amd64
            output: moss.dll
            header: moss.h
            goos: windows
            goarch: amd64
          - os: macos-15-intel
            label: macos-amd64
            output: libmoss.dylib
            header: libmoss.h
            goos: darwin
            goarch: amd64
          - os: macos-latest
            label: macos-arm64
            output: libmoss.dylib
            header: libmoss.h
            goos: darwin
            goarch: arm64
    env:
      CGO_ENABLED: "1"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MinGW
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Build shared library
        run: go build -buildmode=c-shared -o ${{ matrix.output }} ./cmd/moss-ffi

      - name: Upload shared artifact
        uses: actions/upload-artifact@v4
        with:
          name: moss-${{ matrix.label }}-shared
          path: |
            ${{ matrix.output }}
            ${{ matrix.header }}
          if-no-files-found: error

  build-chat:
    name: Build Chat (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            output: moss-chat
            goos: linux
            goarch: amd64
          - os: windows-latest
            label: windows-amd64
            output: moss-chat.exe
            goos: windows
            goarch: amd64
          - os: macos-15-intel
            label: macos-amd64
            output: moss-chat
            goos: darwin
            goarch: amd64
          - os: macos-latest
            label: macos-arm64
            output: moss-chat
            goos: darwin
            goarch: arm64
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build native chat
        run: go build -trimpath -ldflags "-s -w" -o ${{ matrix.output }} ./cmd/moss-chat

      - name: Upload chat artifact
        uses: actions/upload-artifact@v4
        with:
          name: moss-chat-${{ matrix.label }}
          path: |
            ${{ matrix.output }}
            cmd/moss-chat/README.md
          if-no-files-found: error
