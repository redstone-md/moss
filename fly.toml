# Root Fly.io config so Fly's GitHub deploy (and a bare `fly deploy`) find it
# here. This deploys a Moss **telemetry gateway**: a node with telemetry on,
# serving the read-only HTTP/SSE API the explorer reads and verifies. Fly
# terminates TLS on *.fly.dev, so it is reachable over https with no mixed
# content when the explorer is loaded over https.
#
# [build].dockerfile forces Fly to build THIS image rather than guessing with
# Nixpacks (whose "run-app" placeholder crash-loops). The build context is the
# repo root, so the Dockerfile's `COPY . .` sees the Go module.
#
# Forking? Change `app` to your own app name. For the signaling relay instead,
# deploy deploy/fly.signal.toml with the CLI (see deploy/README.md).

app = "moss-tty8dw"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile.gateway"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
